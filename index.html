<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gaming Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0b0e14;
            --accent-color: #ffcc00;
            --btn-glow: #f39c12;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--primary-bg);
            color: #fff;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            text-align: center;
        }

        .container {
            width: 90%;
            max-width: 450px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 25px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 204, 0, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 24px;
            margin-bottom: 15px;
            background: linear-gradient(to right, #fff, var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 14px;
            color: #bbb;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        /* Blazing & Moving Button */
        .blazing-btn {
            display: inline-block;
            padding: 18px 40px;
            font-size: 18px;
            font-weight: 800;
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffcc00, #f39c12, #ffcc00);
            background-size: 200% 200%;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: 0.3s;
            animation: blazingMove 2s infinite alternate, gradientShift 3s infinite;
            box-shadow: 0 0 20px var(--btn-glow);
        }

        @keyframes blazingMove {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-10px) scale(1.05); }
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .blazing-btn:hover {
            box-shadow: 0 0 40px var(--accent-color);
            transform: scale(1.1);
        }

        .timer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #666;
        }

        #seconds {
            color: var(--accent-color);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>WELCOME TO ELITE GAMING</h1>
        <p>Experience the next level of online entertainment with the most trusted platform. Premium rewards and 24/7 support await you.</p>
        
        <a href="https://12xbet.pages.dev/" class="blazing-btn">Play & Win Now</a>

        <div class="timer-text">
            Redirecting to the main server in <span id="seconds">10</span> seconds...
        </div>
    </div>

    <script>
        const TARGET_URL = "https://12xbet.pages.dev/";
        let timeLeft = 10;
        const timerElement = document.getElementById('seconds');

        // Countdown Timer logic
        const countdown = setInterval(() => {
            timeLeft--;
            timerElement.innerText = timeLeft;
            
            if (timeLeft <= 0) {
                clearInterval(countdown);
                window.location.href = TARGET_URL;
            }
        }, 1000);

        // Redirect when button clicked
        document.querySelector('.blazing-btn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = TARGET_URL;
        });
    </script>
</body>
</html>
