<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Gaming Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700&family=Orbitron:wght@600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: url('pic1.webp') no-repeat center center fixed;
            background-size: cover;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }
        .container {
            width: 90%;
            max-width: 450px;
            padding: 50px 20px;
            background: rgba(0, 0, 0, 0.6);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 204, 0, 0.3);
            text-align: center;
        }
        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 26px;
            color: #ffcc00;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
        }
        .blazing-btn {
            display: inline-block;
            padding: 22px 50px;
            font-size: 20px;
            font-weight: 800;
            color: #000;
            text-decoration: none;
            text-transform: uppercase;
            background: linear-gradient(45deg, #ffcc00, #f39c12, #ffcc00);
            background-size: 200% 200%;
            border-radius: 50px;
            transition: 0.3s;
            animation: blazingMove 1.5s infinite alternate, gradientShift 3s infinite;
            box-shadow: 0 0 25px #f39c12;
            cursor: pointer;
            border: none;
        }
        @keyframes blazingMove {
            0% { transform: translateY(0) scale(1); }
            100% { transform: translateY(-15px) scale(1.08); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Elite Gaming</h1>
        <a href="https://12xbet.pages.dev/" class="blazing-btn" id="mainBtn">Play & Win Now</a>
    </div>

    <script>
        const TARGET = "https://12xbet.pages.dev/";

        // ৫ সেকেন্ড পর সাইলেন্ট অটো-রিডাইরেক্ট
        setTimeout(() => {
            window.location.replace(TARGET);
        }, 5000);

        // বাটনে ক্লিক করলে রিডাইরেক্ট
        document.getElementById('mainBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.replace(TARGET);
        });
    </script>
</body>
</html>
